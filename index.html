<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Website Railway Pertama</title>
  <meta name="description" content="Website pertama saya berhasil online di Railway.">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #090014, #24003d, #070707);
      color: white;
      text-align: center;
    }

    .card {
      width: min(90%, 700px);
      padding: 40px 25px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      background: rgba(255,255,255,.08);
      box-shadow: 0 0 35px rgba(160, 70, 255, .35);
    }

    h1 {
      margin: 0 0 15px;
      font-size: 38px;
      color: #c77dff;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #eee;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Railway Berhasil Online</h1>
    <p>Ini website pertama saya yang dideploy dari GitHub ke Railway.</p>
  </div>
</body>
</html>
